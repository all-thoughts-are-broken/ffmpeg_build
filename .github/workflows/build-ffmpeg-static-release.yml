name: build-ffmpeg-static-release

on:
  workflow_dispatch:
    inputs:
      ffmpeg_ref:
        description: FFmpeg git tag or branch to build
        required: true
        default: n7.1.3
        type: string
      release_tag:
        description: GitHub release tag to create
        required: false
        default: ""
        type: string

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      ffmpeg_ref: ${{ steps.vars.outputs.ffmpeg_ref }}
      artifact_ref: ${{ steps.vars.outputs.artifact_ref }}
      release_tag: ${{ steps.vars.outputs.release_tag }}
    steps:
      - name: Resolve release metadata
        id: vars
        shell: bash
        env:
          INPUT_FFMPEG_REF: ${{ inputs.ffmpeg_ref }}
          INPUT_RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail
          ffmpeg_ref="${INPUT_FFMPEG_REF:-n7.1.3}"
          artifact_ref="${ffmpeg_ref//\//-}"

          if [[ -n "${INPUT_RELEASE_TAG:-}" ]]; then
            release_tag="$INPUT_RELEASE_TAG"
          else
            release_tag="ffmpeg-${artifact_ref}"
          fi

          echo "ffmpeg_ref=$ffmpeg_ref" >> "$GITHUB_OUTPUT"
          echo "artifact_ref=$artifact_ref" >> "$GITHUB_OUTPUT"
          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"

  build_windows:
    runs-on: windows-2022
    needs: prepare
    env:
      FFMPEG_REF: ${{ needs.prepare.outputs.ffmpeg_ref }}
      ARTIFACT_REF: ${{ needs.prepare.outputs.artifact_ref }}
    steps:
      - uses: actions/checkout@v4

      - name: Enable MSVC toolchain
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64

      - name: Install MSYS2 build tools
        uses: msys2/setup-msys2@v2
        with:
          update: true
          path-type: inherit
          install: >-
            diffutils
            make
            nasm
            pkgconf

      - name: Clone FFmpeg source
        shell: msys2 {0}
        run: git clone --depth 1 --branch "$FFMPEG_REF" https://github.com/FFmpeg/FFmpeg ffmpeg_src

      - name: Build static libraries
        shell: msys2 {0}
        env:
          FFMPEG_SOURCE_DIR: ffmpeg_src
        run: bash scripts/build_ffmpeg_win.sh ffmpeg_release/win64

      - name: Add CMake package file
        shell: msys2 {0}
        run: mkdir -p ffmpeg_release/win64/cmake && cp ffmpeg_out/cmake/FFmpegConfig.cmake ffmpeg_release/win64/cmake/FFmpegConfig.cmake

      - name: Package artifact
        id: package
        shell: pwsh
        run: |
          $archive = "ffmpeg-$env:ARTIFACT_REF-win64.zip"
          Compress-Archive -Path "ffmpeg_release/win64" -DestinationPath $archive -Force
          "archive=$archive" >> $env:GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-win64
          path: ${{ steps.package.outputs.archive }}
          if-no-files-found: error

  build_linux:
    runs-on: ubuntu-24.04
    needs: prepare
    env:
      FFMPEG_REF: ${{ needs.prepare.outputs.ffmpeg_ref }}
      ARTIFACT_REF: ${{ needs.prepare.outputs.artifact_ref }}
      FFMPEG_ARCH: x86_64
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y nasm pkg-config

      - name: Clone FFmpeg source
        shell: bash
        run: git clone --depth 1 --branch "$FFMPEG_REF" https://github.com/FFmpeg/FFmpeg ffmpeg_src

      - name: Build static libraries
        shell: bash
        env:
          FFMPEG_SOURCE_DIR: ffmpeg_src
        run: bash scripts/build_ffmpeg_unix.sh ffmpeg_release/linux-x86_64

      - name: Add CMake package file
        shell: bash
        run: mkdir -p ffmpeg_release/linux-x86_64/cmake && cp ffmpeg_out/cmake/FFmpegConfig.cmake ffmpeg_release/linux-x86_64/cmake/FFmpegConfig.cmake

      - name: Package artifact
        id: package
        shell: bash
        run: |
          set -euo pipefail
          archive="ffmpeg-${ARTIFACT_REF}-linux-x86_64.tar.gz"
          tar -C ffmpeg_release -czf "$archive" linux-x86_64
          echo "archive=$archive" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-linux-x86_64
          path: ${{ steps.package.outputs.archive }}
          if-no-files-found: error

  build_macos:
    runs-on: macos-15-intel
    needs: prepare
    env:
      FFMPEG_REF: ${{ needs.prepare.outputs.ffmpeg_ref }}
      ARTIFACT_REF: ${{ needs.prepare.outputs.artifact_ref }}
      FFMPEG_ARCH: x86_64
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        shell: bash
        run: |
          set -euo pipefail
          brew install nasm pkg-config

      - name: Clone FFmpeg source
        shell: bash
        run: git clone --depth 1 --branch "$FFMPEG_REF" https://github.com/FFmpeg/FFmpeg ffmpeg_src

      - name: Build static libraries
        shell: bash
        env:
          FFMPEG_SOURCE_DIR: ffmpeg_src
        run: bash scripts/build_ffmpeg_unix.sh ffmpeg_release/macos-x86_64

      - name: Add CMake package file
        shell: bash
        run: mkdir -p ffmpeg_release/macos-x86_64/cmake && cp ffmpeg_out/cmake/FFmpegConfig.cmake ffmpeg_release/macos-x86_64/cmake/FFmpegConfig.cmake

      - name: Package artifact
        id: package
        shell: bash
        run: |
          set -euo pipefail
          archive="ffmpeg-${ARTIFACT_REF}-macos-x86_64.tar.gz"
          tar -C ffmpeg_release -czf "$archive" macos-x86_64
          echo "archive=$archive" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-macos-x86_64
          path: ${{ steps.package.outputs.archive }}
          if-no-files-found: error

  release:
    runs-on: ubuntu-latest
    needs:
      - prepare
      - build_windows
      - build_linux
      - build_macos
    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.release_tag }}
          name: ${{ needs.prepare.outputs.release_tag }}
          body: |
            FFmpeg ref: ${{ needs.prepare.outputs.ffmpeg_ref }}

            Build profile:
            - static libraries only
            - mov demuxer
            - mp4 muxer
            - file protocol
            - AAC and H264 decoders
            - copy encoder
            - AAC and H264 parsers
            - AAC ADTS to ASC and H264 MP4 to Annex B bitstream filters

            Each package also includes cmake/FFmpegConfig.cmake for direct CMake import.
          files: |
            release-artifacts/ffmpeg-win64/*
            release-artifacts/ffmpeg-linux-x86_64/*
            release-artifacts/ffmpeg-macos-x86_64/*
          fail_on_unmatched_files: true
